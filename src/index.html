<div class="site">
    <h1>🌑 Site Interativo</h1>

    <input type="checkbox" id="btn1">
    <input type="checkbox" id="btn2">
    <input type="checkbox" id="btn3">

    <div class="tabs">
        <label for="btn1">🔍 Seção 1</label>
        <label for="btn2">📘 Seção 2</label>
        <label for="btn3">🔒 Seção 3</label>
    </div>

    <div>
        <div class="section section1">Seção 1: Bem-vindo(a)! Você descobriu a primeira parte da seção.</div>
        <div class="section section2">Seção 2: Ótimo! Continue clicando para desbloquear tudo.</div>
        <div class="section section3">Seção 3: Quase lá! Prepare-se para a revelação final.</div>
    </div>

    <div #="final" class="final">🎉 Parabéns você desbloqueou todo o conteúdo!</div>

    <div class="form">
        <h1>📚 Formulário de Contato</h1>
        <input type="text" class="form1" id="nome" placeholder="Seu nome">
        <input type="email" id="email" class="form2" placeholder="Seu e-mail">
        <textarea name="" id="form3" placeholder="Sua mensagem"></textarea>
        <input type="button" value="Enviar" onclick="enviar()">
      <div id="info"></div>
    </div>
</div>
